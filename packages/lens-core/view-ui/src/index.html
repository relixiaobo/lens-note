<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>lens</title>
  <link rel="stylesheet" href="/app.css" />
  <!-- React Flow stylesheet — only used by the ?engine=rf renderer but always
       loaded since it's a small static file. -->
  <link rel="stylesheet" href="/xyflow.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">lens</a>
    <div class="stats" id="stats">—</div>
    <div class="mode-badge hidden" id="mode-badge"></div>
    <input class="search" id="search" type="text" placeholder="search title…" autocomplete="off" />
    <nav class="top-nav">
      <button class="btn btn-primary" id="new-whiteboard-top" title="New whiteboard (⌘⇧N)">+ Whiteboard</button>
      <button class="btn" id="relayout" title="Re-run layout">⟳</button>
    </nav>
  </header>

  <!-- Main stage: canvas on the left, reader panel slides in from the right -->
  <main id="stage" class="stage">
    <div id="canvas-holder" class="canvas-holder">
      <div id="graph" class="graph"></div>
      <div class="filters" id="filters">
        <label><input type="checkbox" data-filter="type" value="note" checked> note</label>
        <label><input type="checkbox" data-filter="type" value="source" checked> source</label>
        <label><input type="checkbox" data-filter="type" value="task" checked> task</label>
        <span class="sep"></span>
        <label><input type="checkbox" data-filter="rel" value="supports" checked> supports</label>
        <label><input type="checkbox" data-filter="rel" value="contradicts" checked> contradicts</label>
        <label><input type="checkbox" data-filter="rel" value="refines" checked> refines</label>
        <label><input type="checkbox" data-filter="rel" value="related" checked> related</label>
        <label><input type="checkbox" data-filter="rel" value="indexes" checked> indexes</label>
        <label><input type="checkbox" data-filter="rel" value="continues" checked> continues</label>
      </div>
    </div>

    <aside id="reader-panel" class="reader-panel hidden" aria-label="Card reader">
      <header class="panel-toolbar">
        <button id="panel-max" title="Maximize" aria-label="Maximize">⤢</button>
        <button id="panel-close" title="Close" aria-label="Close">✕</button>
      </header>
      <article id="card" class="card">
        <div class="card-loading">Loading…</div>
      </article>
    </aside>

    <!-- Edge reason tooltip floats above the canvas -->
    <div id="edge-tooltip" class="edge-tooltip hidden"></div>
  </main>

  <div id="empty" class="empty hidden">
    <h2>No notes yet</h2>
    <p>Write your first one from the terminal:</p>
    <code>lens write '{"type":"note","title":"my first thought"}' --json</code>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
